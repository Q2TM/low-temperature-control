environments:
  - name: main
    enabled: true
    size: [3, 3]
    instruments:
      - type: thermometer
        position: [0, 0]
        name: Main Thermometer
        thermoChannel: 1
      - type: heater
        position: [2, 2]
        name: Main Heater
        heaterPin: 18
        heaterPower: 2 # Watts
      - type: heater
        position: [0, 2]
        name: Cooler 1
        heaterPin: 1
        heaterPower: -2 # Watts
        initialPower: 1 # Optional: start at 100% power (always on cooler)
      - type: heater
        position: [0, 2]
        name: Cooler 2
        heaterPin: 2
        heaterPower: -2 # Watts
        initialPower: 1 # Optional: start at 100% power (always on cooler)
    externalTemperature: 25
    externalConductivity: 0.1 # Watts per Kelvin
    internalConductivity: 0.5 # Watts per Kelvin
