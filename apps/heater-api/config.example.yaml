# Heater API Configuration
# Copy this file to config.yaml and uncomment the heater type you use.
# If you have more than one heater, duplicate the channel block and adjust channel_id.
# All sections except 'channels' are optional and will use sensible defaults if omitted.

# ── Channel Configuration ──────────────────────────────────────────────
# Each channel represents a heater associated with a Lakeshore thermometer channel.
# Uncomment ONE of the three heater types below.
#
# Supported heater types:
#   gpio  — PWM-controlled relay via Raspberry Pi GPIO
#   psu   — Programmable power supply over serial (V = Vmax × √duty, P = V²/R)
#   mock  — Simulated heater (delegates to simulator API)

channels:
  # Each channel may set max_temp_celsius to override the global pid.max_temp_celsius safety ceiling.

  # ── GPIO heater ──
  # - channel_id: 1
  #   name: "Heater"
  #   thermo_channel: 5
  #   enabled: true
  #   max_temp_celsius: 40.0  # Optional per-channel safety ceiling override
  #   heater:
  #     type: gpio
  #     gpio_pin: 18          # GPIO BCM pin number
  #     frequency: 0.2        # PWM frequency in Hz (default: 0.2)
  #     max_power_watts: 45.0 # Hardcoded max power; GPIO cannot read real power

  # ── PSU heater ──
  # - channel_id: 1
  #   name: "Heater"
  #   thermo_channel: 5
  #   enabled: true
  #   max_temp_celsius: 40.0  # Optional per-channel safety ceiling override
  #   heater:
  #     type: psu
  #     serial_port: "/dev/ttyUSB0" # Auto-detected if omitted
  #     baudrate: 9600              # Serial baud rate (default: 9600)
  #     max_voltage: 12.0           # Maximum output voltage in volts
  #     max_wattage: 25.0           # Maximum output wattage in watts

  # ── Mock heater (for development / simulator) ──
  # - channel_id: 1
  #   name: "Heater"
  #   thermo_channel: 5
  #   enabled: true
  #   max_temp_celsius: 40.0  # Optional per-channel safety ceiling override
  #   heater:
  #     type: mock
  #     max_power_watts: 45.0 # Simulated max power (default: 45.0)

# ── PID Controller Settings ────────────────────────────────────────────

pid:
  default_target: 0.0 # Initial target temperature in °C
  loop_interval_seconds: 3.0 # Sleep between PID loop iterations
  dt_min: 1.0 # Minimum dt clamp for PID update (seconds)
  dt_max: 15.0 # Maximum dt clamp for PID update (seconds)
  output_min: 0.0 # Minimum PID output (duty percent)
  output_max: 100.0 # Maximum PID output (duty percent)
  anti_windup_min: -150.0 # Anti-windup integral lower bound
  anti_windup_max: 150.0 # Anti-windup integral upper bound
  max_temp_celsius: 40.0 # Auto-stop PID + zero heater if reading exceeds this (per-channel default; overridable via channels[].max_temp_celsius)
  max_seconds_without_read: 30.0 # Auto-stop PID + zero heater if no successful temperature read for this many seconds


# ── Server Settings ────────────────────────────────────────────────────
# Can also be overridden by env vars: HOST, PORT, WORKERS

# server:
#   host: "0.0.0.0"
#   port: 8001
#   workers: 1

# ── OpenTelemetry Settings ─────────────────────────────────────────────
# Can also be overridden by env vars:
#   OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_INSECURE, OTEL_METRIC_EXPORT_INTERVAL

# otel:
